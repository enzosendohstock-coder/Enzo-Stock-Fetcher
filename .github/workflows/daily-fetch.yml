name: Daily Fetch

on:
  schedule:
    - cron: '30 9 * * *'   # 每天 UTC 09:30 執行，即台灣時間下午 5:30
    - cron: '30 10 * * *'  # 每天 UTC 10:30 執行，即台灣時間下午 6:30
  workflow_dispatch:
    inputs:
      date:
        description: '要補抓的日期 (格式 yyyyMMdd)，留空則抓今天'
        required: false
        default: ''

# 同一時間只能有一個執行序在跑，避免兩次排程(或排程跟手動觸發)重疊時
# 同時讀寫 Google Sheet 造成資料競爭。新的執行會排隊等前一個跑完，不會取消它。
concurrency:
  group: daily-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Write Google service account credentials
        run: |
          mkdir -p src/PPI.Stock.Fetcher/credentials
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > src/PPI.Stock.Fetcher/credentials/service-account.json

      - name: Run fetcher
        working-directory: src/PPI.Stock.Fetcher
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            dotnet run -- ${{ github.event.inputs.date }}
          else
            dotnet run
          fi
