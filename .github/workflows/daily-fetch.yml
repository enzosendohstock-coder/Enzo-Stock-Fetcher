name: Daily Fetch

on:
  schedule:
    - cron: '0 9 * * *'  # 每天 UTC 08:00 執行，即台灣時間下午 4 點
  workflow_dispatch:
    inputs:
      date:
        description: '要補抓的日期 (格式 yyyyMMdd)，留空則抓今天'
        required: false
        default: ''

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Write Google service account credentials
        run: |
          mkdir -p src/PPI.Stock.Fetcher/credentials
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > src/PPI.Stock.Fetcher/credentials/service-account.json

      - name: Run fetcher
        working-directory: src/PPI.Stock.Fetcher
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            dotnet run -- ${{ github.event.inputs.date }}
          else
            dotnet run
          fi
