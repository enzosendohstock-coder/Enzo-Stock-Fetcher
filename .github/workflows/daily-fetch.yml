name: Daily Fetch

# 排程觸發改由 Cloudflare Worker 的 Cron Trigger 呼叫這裡的 workflow_dispatch 完成，
# 不再用 GitHub 自己的 schedule(GitHub 官方文件本身載明 schedule 是 best-effort，
# 實測觀察過延遲最長達 8 小時；workflow_dispatch 是 API 觸發，不會卡進那個佇列）。
on:
  workflow_dispatch:
    inputs:
      date:
        description: '要補抓的日期 (格式 yyyyMMdd)，留空則抓今天'
        required: false
        default: ''

# 同一時間只能有一個執行序在跑，避免排程跟手動觸發重疊時同時寫入 D1 造成資料競爭。
# 新的執行會排隊等前一個跑完，不會取消它。
concurrency:
  group: daily-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      WorkerApi__BaseUrl: ${{ vars.WORKER_API_BASE_URL }}
      WorkerApi__ApiToken: ${{ secrets.FETCHER_API_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Run fetcher
        working-directory: src/PPI.Stock.Fetcher
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            dotnet run -- ${{ github.event.inputs.date }}
          else
            dotnet run
          fi
